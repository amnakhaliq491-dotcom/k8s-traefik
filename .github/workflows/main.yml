name: Build & Deploy to GKE

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
  REPO: backend-repo
  IMAGE: backend-api
  NAMESPACE: backend-prod

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Authenticate to GCP
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. Set up gcloud CLI
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # 4. Configure Docker to push to Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # 5. Build & Push Docker Image
      - name: Build and Push Docker Image
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}"

          docker build \
          -f backend/Dockerfile \
          -t "${IMAGE_URI}:${{ github.sha }}" \
          -t "${IMAGE_URI}:latest" \
          backend

           docker push "${IMAGE_URI}:${{ github.sha }}"
           docker push "${IMAGE_URI}:latest"
   

     

      # 6. Get GKE credentials
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}

      # 7. Ensure namespace exists
      - name: Ensure namespace
        run: |
          kubectl get namespace ${{ env.NAMESPACE }} || \
            kubectl create namespace ${{ env.NAMESPACE }}

      # 8. Apply cert-manager ClusterIssuer (idempotent)
      - name: Apply ClusterIssuer
        run: kubectl apply -f k8s/cluster-issuer.yaml

      # 9. Apply Deployment + Service + ServiceAccount
      #    Substitutes the actual image URI into the manifest
      - name: Deploy to GKE
        run: |
          IMAGE_URI="us-central1-docker.pkg.dev/dev-test-498808/backend-repo/backend-api:${{ github.sha }}"
          
          sed "s|IMAGE_PLACEHOLDER|${IMAGE_URI}|g" k8s/deployment.yaml | kubectl apply -f -
          
          # Verify substitution worked
          echo "Deploying image: ${IMAGE_URI}"

      # 10. Apply Ingress (TLS + routing)
      - name: Apply Ingress
        run: kubectl apply -f k8s/ingress.yaml

      # 11. Wait for rollout to complete
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend-api \
            -n ${{ env.NAMESPACE }} --timeout=180s
