name: Build & Deploy to GKE

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
  ARTIFACT_REPO: backend-repo
  IMAGE: backend-api
  NAMESPACE: backend-prod
  K8S_MANIFESTS_REPO: amnakhaliq491-dotcom/backend-k8s

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ── 1. Checkout app source ───────────────────────────────────────────
      - name: Checkout app source
        uses: actions/checkout@v4
        with:
          path: app

      # ── 2. Checkout K8s manifests ────────────────────────────────────────
      - name: Checkout K8s manifests
        uses: actions/checkout@v4
        with:
          repository: ${{ env.K8S_MANIFESTS_REPO }}
          path: manifests
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Authenticate to GCP via Workload Identity Federation ──────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # ── 4. Set up gcloud ─────────────────────────────────────────────────
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # ── 5. Configure Docker ───────────────────────────────────────────────
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── 6. Build & Push image ─────────────────────────────────────────────
      - name: Build and Push Docker image
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE }}"
          docker build \
            -t "${IMAGE_URI}:${{ github.sha }}" \
            -t "${IMAGE_URI}:latest" \
            ./app
          docker push "${IMAGE_URI}:${{ github.sha }}"
          docker push "${IMAGE_URI}:latest"
          echo "IMAGE_URI=${IMAGE_URI}:${{ github.sha }}" >> $GITHUB_ENV

      # ── 7. Get GKE credentials ────────────────────────────────────────────
      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}

      # ── 8. Ensure namespace ───────────────────────────────────────────────
      - name: Ensure namespace
        run: |
          kubectl get namespace ${{ env.NAMESPACE }} \
            || kubectl create namespace ${{ env.NAMESPACE }}

      # ── 9. Apply ClusterIssuer ────────────────────────────────────────────
      - name: Apply ClusterIssuer
        run: kubectl apply -f manifests/k8s/cluster-issuer.yaml

      # ── 10. Deploy to GKE ─────────────────────────────────────────────────
      - name: Deploy to GKE
        run: |
          sed "s|IMAGE_PLACEHOLDER|${{ env.IMAGE_URI }}|g" \
            manifests/k8s/deployment.yaml | kubectl apply -f -

      # ── 11. Apply Ingress ──────────────────────────────────────────────────
      - name: Apply Ingress
        run: kubectl apply -f manifests/k8s/ingress.yaml

      # ── 12. Wait for rollout ───────────────────────────────────────────────
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend-api \
            --namespace=${{ env.NAMESPACE }} \
            --timeout=300s

      # ── 13. Verify deployment ──────────────────────────────────────────────
      - name: Verify deployment
        run: |
          echo " Pods:"
          kubectl get pods -n ${{ env.NAMESPACE }}
          echo " Certificate:"
          kubectl get certificate -n ${{ env.NAMESPACE }}
          echo " Ingress:"
          kubectl get ingress -n ${{ env.NAMESPACE }}
          echo " Services:"
          kubectl get svc -n ${{ env.NAMESPACE }}
